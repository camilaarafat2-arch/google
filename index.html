<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

<header>

    <div class="menu">
        <a href="#">Gmail</a>
        <a href="#">Imagens</a>

        <div class="caixa-icone">
            <span class="material-icons">apps</span>
        </div>

        <button class="botao-login">
            Fazer login
        </button>
    </div>

</header>

<main>

    <img
        class="logo-google"
        src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
        alt="Google"
    >

    <div class="caixa-input">

        <span class="material-icons icone-pesquisa">search</span>

        <input
            class="input-pesquisa"
            type="text"
            placeholder="Pesquise no Google"
        >

        <div class="caixa-teclado">
            <span class="material-icons">keyboard</span>
        </div>

        <span class="material-icons microfone">mic</span>

    </div>

    <div class="caixa-botoes">
        <button class="botao">Pesquisa Google</button>
        <button class="botao">Estou com sorte</button>
    </div>

</main>

<footer>

    <div class="pais">
        Brasil
    </div>

    <div class="rodape">

        <div class="rodape-esquerda">
            <a href="#">Publicidade</a>
            <a href="#">Negócios</a>
            <a href="#">Sobre</a>
            <a href="#">Como funciona a Pesquisa</a>
        </div>

        <div class="rodape-direita">
            <a href="#">Privacidade</a>
            <a href="#">Termos</a>
            <a href="#">Configurações</a>
        </div>

    </div>

</footer>

</body>
</html>
